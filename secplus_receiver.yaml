# secplus_receiver.yaml
#
# ESPHome configuration for a Security+ v2 garage door receiver.
#
# Hardware assumed:
#   - ESP32 (any variant)
#   - 310 MHz,315 MHz, or 390 MHz Receiver like CC1101 on GPIO 34
#     (use any input-capable pin; GPIO 34-39 are input-only on ESP32)
#
# Files required (place alongside this YAML or adjust paths):
#   components/secplus_decoder/secplus_decode.h
#   components/secplus_decoder/secplus_decode.c
#   components/secplus_decoder/secplus_shim.h
#
# secplus library (libsecplus / secplus.h + secplus.c) must also be present.
# If you're using the standalone C library, add it to the same folder and
# list it under libraries or extra_files below.


# ─────────────────────────────────────────────────────────────────────────────
#      Configuration
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  remote_id_name: "Remote ID"               # Name of the remote ID text sensor
  remote_rolling_code_name: "Rolling Code"  # Name of the rolling code text sensor
  remote_button_name: "Button ID"

  # Pin connections to CC1101
  spi_clk_pin: GPIO07
  spi_miso_pin: GPIO08
  spi_mosi_pin: GPIO09

  # CC1101 Receiver
  cc1101_cs_pin: GPIO04
  cc1101_frequency: 390.00MHz  # 310MHz, 315Mhz, 390Mhz

  receiver_pin: GPIO02

# ─────────────────────────────────────────────────────────────────────────────


#dashboard_import:
#  package_import_url: github://greenbus4/secplus_receiver/secplus_receiver.yaml

# ── Load Component from Github  ──────────────────────────────────────────────
external_components:
  - source: github://greenbus4/secplus_receiver@main
    components: [secplus_receiver]
    refresh: 1d


# ── Configure Receiver ───────────────────────────────────────────────────────

secplus_receiver:
  id: secplus_receiver_id

  # These can be optional, depending on what
  # you want to bring into HA
  remote_id_sensor:
    name: ${remote_id_name}

  button_sensor:
    name: ${remote_button_name}

  rolling_code_sensor:
    name: ${remote_rolling_code_name}

  # Set this true and the event "esphome.secplus_received"
  # will fire when data is received. Event data will include
  # the remote_id, button, and rolling_code.
  fire_homeassistant_event: true


# ── Needed if fire_homeassistant_event is trues ──────────────────────────────
api:
  homeassistant_services: true


# ── SPI bus ──────────────────────────────────────────────────────────────────

spi:
  clk_pin: ${spi_clk_pin}
  mosi_pin: ${spi_mosi_pin}
  miso_pin: ${spi_miso_pin}

# ── CC1101 transceiver ───────────────────────────────────────────────────────
#
# Set frequency to match your remotes:
#   390.00MHz — LiftMaster / Chamberlain 891LM, 893LM, 895LM (most common in US)
#   315.00MHz — Older LiftMaster / Craftsman remotes
#   310.00MHz — Some regional variants

cc1101:
  cs_pin: ${cc1101_cs_pin}
  frequency: ${cc1101_frequency}
  modulation_type: ASK/OOK
  symbol_rate: 4000
  filter_bandwidth: 203kHz
  dc_blocking_filter: true

# ── remote_receiver ──────────────────────────────────────────────────────────
#
# Captures raw pulse trains. The secplus_receiver attaches itself as a listener
# automatically, so no on_raw lambda is needed.

remote_receiver:
  pin:
    number: ${receiver_pin}
    # inverted: true   # uncomment if your hardware inverts the signal
  tolerance: 50%
  buffer_size: 20kb

