# secplus_receiver_example.yaml
#
# Example ESPHome configuration for the secplus_receiver external component.
#
# Hardware:
#   - ESP32-S3 (any ESP32 variant works; adjust `variant` below)
#   - CC1101 sub-GHz transceiver wired via SPI
#
# Wiring (adjust GPIO numbers to match your board):
#
#   CC1101 Pin  →  ESP32 Pin
#   ─────────────────────────
#   VCC          3.3 V
#   GND          GND
#   MOSI         GPIO9
#   MISO         GPIO8
#   SCK          GPIO7
#   CS           GPIO4
#   GDO0         GPIO2   ← demodulated OOK output → remote_receiver

substitutions:
  host_name: secplus-receiver
  friendly_name: "Security+ 2.0 Receiver"

  ## Configuration parameters -- uncomment as needed
  #remote_fixed_data_name:    "Fixed Data"
  #remote_id_name:            "Remote ID"               # Name of the remote ID text sensor
  #remote_rolling_code_name:  "Rolling Code"  # Name of the rolling code text sensor
  #remote_button_name:        "Button ID"

  # Pin connections to CC1101
  #spi_clk_pin: GPIO07
  #spi_miso_pin: GPIO08
  #spi_mosi_pin: GPIO09

  # CC1101 Receiver
  #cc1101_cs_pin: GPIO04
  #cc1101_frequency: 390.00MHz  # 310MHz, 315Mhz, 390Mhz

  #receiver_pin: GPIO02

# ── Remote Package ───────────────────────────────────────────────────────
packages:
  remote_packate_shorthand: github://greenbus4/secplus_receiver/secplus_receiver.yaml@main



# ── ESPHome core ─────────────────────────────────────────────────────────────

esphome:
  name: ${host_name}
  friendly_name: ${friendly_name}

logger:
  level: DEBUG

esp32:
  variant: esp32s3   # change to esp32, esp32s2, esp32c3, etc. as needed
  framework:
    type: esp-idf

# ── Connectivity ─────────────────────────────────────────────────────────────

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

